{% extends "base.html" %}
{% block title %}Upload — Flashcards{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-2">Generate Cards with AI</h1>
<p class="text-sm text-gray-500 mb-8">Paste text or upload a PDF — the AI will draft 5–15 flashcards for you to review.</p>

{% if error %}
<div class="mb-4 text-sm text-red-600 bg-red-50 border border-red-200 rounded px-3 py-2">{{ error }}</div>
{% endif %}

<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <form method="post" action="/upload" enctype="multipart/form-data" class="space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Paste text</label>
      <textarea name="text" rows="8" placeholder="Paste any text, notes, or article here…"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>
    </div>

    <div class="flex items-center gap-3 text-gray-400 text-xs">
      <div class="flex-1 border-t border-gray-200"></div>
      <span>or</span>
      <div class="flex-1 border-t border-gray-200"></div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Upload PDF</label>
      <input type="file" name="file" accept=".pdf,application/pdf"
             class="block w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100"/>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Number of cards</label>
      <input type="number" name="count" value="10" min="5" max="15"
             class="w-24 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
    </div>

    <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm transition">
      Generate Flashcards
    </button>
  </form>
</div>
{% endblock %}
